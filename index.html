<!DOCTYPE html>
<html>
<head>
  <title>StokApp Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
    }

    .sidebar {
      width: 230px;
      height: 100vh;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar h2 { text-align:center; }

    .sidebar a {
      display:block;
      padding:12px;
      margin:10px 0;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.1);
    }

    .main { flex:1; padding:20px; }

    .cards {
      display:flex;
      gap:20px;
    }

    .card {
      flex:1;
      background: rgba(255,255,255,0.05);
      padding:20px;
      border-radius:20px;
    }

    input, select {
      padding:12px;
      margin:5px;
      border-radius:10px;
      border:none;
      background: rgba(255,255,255,0.1);
      color:white;
    }

    select option {
      background:#1e293b;
      color:white;
    }

    button {
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .blue { background:#3b82f6; }
    .red { background:#ef4444; }
    .yellow { background:#f59e0b; }
    .green { background:#22c55e; }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      background: rgba(255,255,255,0.05);
      border-radius:15px;
      overflow:hidden;
    }

    th, td {
      padding:14px;
      text-align:center;
    }

    th { background: rgba(255,255,255,0.1); }

    tr:hover { background: rgba(255,255,255,0.08); }

    .badge {
      padding:6px 14px;
      border-radius:20px;
      font-size:12px;
      font-weight:600;
      display:inline-block;
      color:white;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 StokApp</h2>
  <a href="#">Dashboard</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card"><h3>Total Barang</h3><h2 id="totalBarang">0</h2></div>
    <div class="card"><h3>Total Stok</h3><h2 id="totalStok">0</h2></div>
    <div class="card"><h3>Total Nilai</h3><h2 id="totalNilai">0</h2></div>
  </div>

  <div>
    <input id="nama" placeholder="Nama Barang">
    <input id="jumlah" type="number" placeholder="Jumlah">
    <input id="harga" type="number" placeholder="Harga">
    <input id="divisi" placeholder="Divisi">
    <button class="blue" onclick="tambahBarang()">Tambah</button>
    <button class="green" onclick="exportExcel()">Export Excel</button>
  </div>

  <div>
    <input id="search" placeholder="Search..." oninput="getBarang()">
    <select id="filterDivisi" onchange="getBarang()">
      <option value="semua">Semua Divisi</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Divisi</th>
        <th>Nama</th>
        <th>Jumlah</th>
        <th>Harga</th>
        <th>Total</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

<script>
/* 🔐 PROTECT LOGIN */
if (!localStorage.getItem("login")) {
  window.location.href = "login.html";
}

const API="https://stok-barang-fawn.vercel.app/";
let semuaData=[];

/* 🎨 WARNA DIVISI */
function getColor(divisi){
  if(!divisi) return "#64748b";

  divisi = divisi.toLowerCase();

  const colors = {
    dapur: "#84cc16",
    kasir: "#06b6d4",
    mie: "#a855f7",
    minuman: "#0ea5e9",
    bakso: "#6366f1",
    adonan: "#ec4899"
  };

  return colors[divisi] || generateColor(divisi);
}

function generateColor(str){
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  return `hsl(${hash % 360}, 70%, 55%)`;
}

/* 📦 GET DATA */
async function getBarang(){
  try {
    const res=await fetch(API);
    semuaData=await res.json();
  } catch {
    alert("Server error!");
    return;
  }

  const search=document.getElementById("search").value.toLowerCase();
  const filter=document.getElementById("filterDivisi").value;

  let html="", stok=0, nilai=0;
  const divisiSet=new Set();

  semuaData.sort((a,b)=>(a.divisi||"").localeCompare(b.divisi||""));

  semuaData.forEach(b=>{
    divisiSet.add(b.divisi || "-");

    const matchDivisi = (filter === "semua") || b.divisi === filter;
    const matchSearch = !search || b.nama.toLowerCase().includes(search);

    if(matchDivisi && matchSearch){
      stok+=b.jumlah;
      nilai+=b.jumlah*b.harga;

      const warna = getColor(b.divisi);

      html+=`
      <tr>
        <td><span class="badge" style="background:${warna}">${b.divisi || "-"}</span></td>
        <td>${b.nama}</td>
        <td>${b.jumlah}</td>
        <td>${b.harga}</td>
        <td>${b.jumlah*b.harga}</td>
        <td>
          <button class="yellow" onclick="editBarang('${b._id}','${b.nama}',${b.jumlah},${b.harga},'${b.divisi}')">Edit</button>
          <button class="red" onclick="hapusBarang('${b._id}')">Hapus</button>
        </td>
      </tr>`;
    }
  });

  list.innerHTML=html;
  totalBarang.innerText=semuaData.length;
  totalStok.innerText=stok;
  totalNilai.innerText=nilai;

  const select=document.getElementById("filterDivisi");
  const currentValue = filter;

  select.innerHTML=`<option value="semua">Semua Divisi</option>`;
  [...divisiSet].sort().forEach(d=>{
    select.innerHTML+=`<option value="${d}" ${currentValue===d?'selected':''}>${d}</option>`;
  });
}

/* ➕ TAMBAH */
async function tambahBarang(){
  if(!nama.value || !jumlah.value || !harga.value){
    alert("Isi semua data!");
    return;
  }

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nama:nama.value,
      jumlah:jumlah.value,
      harga:harga.value,
      divisi:divisi.value
    })
  });

  nama.value="";
  jumlah.value="";
  harga.value="";
  divisi.value="";

  getBarang();
}

/* ❌ HAPUS */
async function hapusBarang(id){
  await fetch(API+"/"+id,{method:"DELETE"});
  getBarang();
}

/* ✏️ EDIT */
function editBarang(id,n,j,h,d){
  const namaBaru=prompt("Nama",n);
  const jumlahBaru=prompt("Jumlah",j);
  const hargaBaru=prompt("Harga",h);
  const divisiBaru=prompt("Divisi",d);

  fetch(API+"/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nama:namaBaru,
      jumlah:jumlahBaru,
      harga:hargaBaru,
      divisi:divisiBaru
    })
  }).then(getBarang);
}

/* 📤 EXPORT */
function exportExcel(){
  const ws = XLSX.utils.json_to_sheet(semuaData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");
  XLSX.writeFile(wb, "stok_barang.xlsx");
}

/* 🚪 LOGOUT */
function logout(){
  localStorage.removeItem("login");
  location.href="login.html";
}

getBarang();
</script>

</body>
</html>
